{% extends 'base.html' %}
{% block title %}System Settings — StockPro{% endblock %}
{% block page_title %}System Settings{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-2xl shadow-md">
    <div class="px-6 py-4 border-b border-gray-100 font-bold text-gray-800">
      <i class="bi bi-sliders mr-2 text-primary-600"></i> Shop Settings
    </div>
    <div class="p-6">
      <form method="post">
        {% csrf_token %}
        <div class="space-y-4">
          {% for field in form %}
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5" for="{{ field.id_for_label }}">{{ field.label }}</label>
              <input type="{% if field.name in 'email' %}email{% else %}text{% endif %}" 
                     name="{{ field.name }}" 
                     id="{{ field.id_for_label }}"
                     class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all bg-white"
                     {% if field.value %}value="{{ field.value }}"{% endif %}
                     {% if field.field.required %}required{% endif %}>
              {% if field.help_text %}
                <p class="text-xs text-gray-500 mt-1">{{ field.help_text }}</p>
              {% endif %}
            </div>
          {% endfor %}
        </div>
        <div class="flex justify-end mt-6">
          <button type="submit" class="px-5 py-2.5 bg-primary-600 text-white rounded-lg font-medium hover:bg-primary-700"><i class="bi bi-check-lg mr-1"></i>Save Settings</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
