{% extends 'base.html' %}
{% block title %}Add Variant — {{ product.name }} — StockPro{% endblock %}
{% block page_title %}Add Variant{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <div class="bg-white rounded-2xl shadow-md">
    <div class="px-6 py-4 border-b border-gray-100 font-bold text-gray-800">Add Variant — {{ product.name }}</div>
    <div class="p-6">
      <form method="post">
        {% csrf_token %}
        <div class="space-y-4">
          {% for field in form %}
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5" for="{{ field.id_for_label }}">{{ field.label }}</label>
              <input type="text" name="{{ field.name }}" id="{{ field.id_for_label }}" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all bg-white" {% if field.field.required %}required{% endif %}>
            </div>
          {% endfor %}
          <input type="hidden" name="product" value="{{ product.pk }}">
        </div>
        <div class="flex justify-between gap-3 mt-6">
          <a href="{% url 'product_detail' product.pk %}" class="px-5 py-2 border border-gray-300 text-gray-600 rounded-lg hover:bg-gray-50 font-medium">Cancel</a>
          <button type="submit" class="px-5 py-2 bg-primary-600 text-white rounded-lg font-medium hover:bg-primary-700">Add Variant</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
