<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inventory Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .navbar-brand { font-size: 1.3rem; }
    .card { border-radius: 12px; }
    .badge { font-size: 0.8rem; }
  </style>
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4 py-3">
  <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">📦 Inventory Manager</a>
  <div class="d-flex gap-2">
    <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm">Dashboard</a>
    <a href="{% url 'product_list' %}" class="btn btn-outline-light btn-sm">Products</a>
    <a href="{% url 'category_list' %}" class="btn btn-outline-light btn-sm">Categories</a>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-4 mb-5">

  <!-- Flash messages (success/error notifications) -->
  {% for message in messages %}
    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
