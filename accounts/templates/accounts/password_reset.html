{% extends 'base.html' %}
{% block title %}Reset Password — StockPro{% endblock %}

{% block extra_css %}
<style>
  body { background: linear-gradient(135deg,#0f0c29,#302b63,#24243e)!important; }
</style>
{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen p-4">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden">
    <div class="p-8 md:p-10">
      <div class="text-center mb-6">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-600 to-indigo-400 flex items-center justify-center font-bold text-white text-xl mx-auto mb-4">SP</div>
        <h4 class="font-bold text-gray-800 mb-2">Reset Password</h4>
        <p class="text-gray-500 text-sm">Enter your email and we'll send you a reset link.</p>
      </div>
      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="{{ form.email.id_for_label }}">Email address</label>
          <input type="email" 
                 name="{{ form.email.name }}" 
                 id="{{ form.email.id_for_label }}" 
                 class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition-all bg-white"
                 placeholder="you@example.com"
                 required>
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-700 hover:to-primary-800 text-white font-semibold py-3 rounded-lg transition-all hover:-translate-y-0.5 shadow-md">
          <i class="bi bi-envelope mr-1"></i>Send Reset Link
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
